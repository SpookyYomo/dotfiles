background_opacity 0.8
copy_on_select yes
hide_window_decorations yes

map f1 launch --cwd=current
map f2 launch --cwd=current --type=tab
map shift+f1 launch --cwd=current --type=os-window
map ctrl+shift+. move_tab_forward
map ctrl+shift+, move_tab_backward
map ctrl+shift+o launch --stdin-source=@last_cmd_output --type=background wl-copy
map ctrl+shift+y kitten unicode_input

allow_remote_control no

map ctrl+alt+1 goto_tab 1
map ctrl+alt+2 goto_tab 2
map ctrl+alt+3 goto_tab 3
map ctrl+alt+4 goto_tab 4
map ctrl+alt+5 goto_tab 5
map ctrl+alt+6 goto_tab 6
map ctrl+alt+7 goto_tab 7
map ctrl+alt+8 goto_tab 8
map ctrl+alt+9 goto_tab 9

inactive_text_alpha 0.8
window_alert_on_bell yes
notify_on_cmd_finish unfocused

window_border_width 0.7pt

tab_fade 0.333 0.667 1

# BEGIN_KITTY_FONTS
font_family      family="SourceCodeVF"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
